services:
  frontend:
    build:
      context: ./tradescenter-frontend
      args:
        VITE_API_BASE_URL: /api
    container_name: tradescenter-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:80"
    restart: unless-stopped
    networks:
      - public
      - internal

  backend:
    build:
      context: ./tradescenter-backend
    container_name: tradescenter-backend
    env_file:
      - ./tradescenter-backend/.env
    expose:
      - "5000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "from urllib.request import urlopen; urlopen('http://127.0.0.1:5000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - internal

networks:
  public:
    driver: bridge
  internal:
    driver: bridge
